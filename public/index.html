<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Étudiant - Attestations IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1a252f; }
        #chatbot-section { display: none; } 
        .log-box { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .success { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align: center;"> Service Étudiant IA</h2>

    <div class="card" id="login-section">
        <h3>Connexion</h3>
        <p>Entrez votre CIN pour vous identifier :</p>
        <input type="text" id="cinInput" placeholder="Ex: 12345678">
        <button onclick="login()">Se connecter</button>
        <p id="login-error" style="color: red;"></p>
    </div>

    <div class="card" id="chatbot-section">
        <h3 id="welcome-msg"></h3>
        
        <p>Demander votre attestation :</p>
        <input type="text" id="anneeInput" value="2023-2024" placeholder="Année universitaire">
        <input type="text" id="semestreInput" value="S1" placeholder="Semestre (S1, S2)">
        <button onclick="demanderAttestation()"> Lancer l'agent IA</button>

        <h4>Logs du système :</h4>
        <div id="logs" class="log-box">En attente de requête...</div>
        
        <div id="download-area" style="margin-top: 15px; display: none;">
            <a id="download-link" href="#" target="_blank">
                <button style="background-color: #27ae60;"> Télécharger l'attestation (PDF)</button>
            </a>
        </div>
    </div>

    <script>
        let authToken = '';
        let etudiantData = {};

        async function login() {
            const cin = document.getElementById('cinInput').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cin })
            });
            const data = await res.json();

            if (res.ok) {
                authToken = data.token;
                etudiantData = data.etudiant;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chatbot-section').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `Bonjour, ${etudiantData.prenom} ${etudiantData.nom} 👋`;
            } else {
                document.getElementById('login-error').innerText = data.error;
            }
        }

        async function demanderAttestation() {
            const logs = document.getElementById('logs');
            logs.innerHTML = "Envoi de la requête à l'agent IA (Ollama)... ⏳<br>";
            document.getElementById('download-area').style.display = 'none';

            const payload = {
                matricule: etudiantData.numero_inscription,
                annee_universitaire: document.getElementById('anneeInput').value,
                semestre: document.getElementById('semestreInput').value,
                periodStart: "2023-09-01", // Hardcodé pour le test
                periodEnd: "2024-01-31"
            };

            try {
                const res = await fetch('/api/attestations', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}` 
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                logs.innerHTML += `<span class="success"> IA a traité la demande ! Statut : Terminé.</span><br>`;
                
                if(data._id) {
                    document.getElementById('download-link').href = `/api/attestations/${data._id}/download`;
                    document.getElementById('download-area').style.display = 'block';
                }

            } catch (err) {
                logs.innerHTML += `<span style="color:red"> Erreur : ${err.message}</span><br>`;
            }
        }
    </script>
</body>
</html>
